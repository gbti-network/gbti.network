# SOW-118: the git-native changelog journal (portable, admin-CODEOWNED house data). This file IS the
# curation: a fork that clones this repo carries its own changelog, and its build publishes its own
# /changelog.json. The Astro build emits src/pages/changelog.json.ts from this, the public /changelog page
# renders it, and the extension new-tab version indicator reads it to show the current build number.
#
# Each entry: { version, build, date, type, title, notes }.
#   version : the semver the extension manifest carries at that point (a release bumps it, a build reuses it).
#   build   : a monotonic integer that increases by one on every entry. The extension shows the highest build.
#   date    : an absolute date (YYYY-MM-DD).
#   type    : release (a public version members see) or build (a dev iteration, shown only when the
#             changelog page's "Show build notes" view is turned on).
#   title   : a short headline (writing conventions: no dashes, no contractions, no smart quotes).
#   notes   : a list of plain lines describing what changed. Never a secret, a token, or a private URL.
#
# The deployment SOP (.data/ops/deployment-ops/README.md) tells the agent to APPEND one entry here on every
# version bump or notable build, and to keep extension/manifest.json version and src/lib/extension.ts in sync.
entries:
  - version: 0.1.0
    build: 32
    date: 2026-07-19
    type: build
    title: Syndication is matrix-only (the Destinations checkboxes are gone)
    notes:
      - The syndication admin no longer has a separate Destinations row. The auto-share matrix (plus the master switch and a channel having its secrets) is now the single control for what posts where.
      - Setting a content type to On for a provisioned channel now actually posts, instead of being silently blocked by a second checkbox. To pause a channel, set its column to Off.

  - version: 0.1.0
    build: 31
    date: 2026-07-19
    type: build
    title: Profile avatar preview, restricted to GitHub and Gravatar
    notes:
      - The Profile page now shows a live avatar preview as you edit.
      - Avatar images are limited to your GitHub avatar or a Gravatar; other image hosts are not allowed, enforced in the editor and at publish.

  - version: 0.1.0
    build: 30
    date: 2026-07-19
    type: build
    title: Manage your profile and social links in the extension
    notes:
      - Added a Profile page in the WorkBench where you edit your display name, headline, bio, skills, and specialties, and add social links across a comprehensive set of platforms with branded icons.
      - Your stored handles now credit you automatically when your content is shared to X, Bluesky, and Mastodon. Skills and specialties show on your public profile.

  - version: 0.1.0
    build: 29
    date: 2026-07-18
    type: build
    title: Trim the public location and protect the contact email
    notes:
      - The legal pages no longer publish a city; they state only that Gethsemane LLC is a United States company, and the state of formation appears only in the Terms governing-law clause.
      - The business contact address is subaddressed and stays obfuscated against scrapers.

  - version: 0.1.0
    build: 28
    date: 2026-07-18
    type: build
    title: The legal pages name the operating business
    notes:
      - The Privacy, Terms, and Contact pages now name Gethsemane LLC as the operator, a United States company, and add a business contact address.
      - Terms gained a Governing Law section, and the footer now links the Privacy Policy.

  - version: 0.1.0
    build: 27
    date: 2026-07-17
    type: build
    title: LinkedIn joins the Social Queue for manual posting
    notes:
      - LinkedIn is now a manual-assist channel: the system renders the post and queues it to the Social Queue for a superadmin to post by hand, since LinkedIn API access is pending.
      - Its templates are editable and it appears in the auto-share matrix like the other channels.

  - version: 0.1.0
    build: 26
    date: 2026-07-17
    type: build
    title: Auto-share content when it gets popular
    notes:
      - A content type set to Popular on a channel now auto-shares once enough distinct members engage with it (opening the expanded view counts by default).
      - Tune the threshold and which interactions count in the admin Content engagement card. Off by default.

  - version: 0.1.0
    build: 25
    date: 2026-07-16
    type: build
    title: Control auto-sharing per content type and per channel
    notes:
      - Auto-sharing is now controlled per content type on each channel (off, on, or popular), so a member share no longer auto-posts unless you turn it on.
      - Added a per-channel delay so one channel can post sooner or later than another, and made the X, Mastodon, and Bluesky templates editable.

  - version: 0.1.0
    build: 24
    date: 2026-07-16
    type: build
    title: Superadmin Debug panel
    notes:
      - Added a superadmin-only Debug item in the avatar menu that turns on structured, redacted diagnostics across the extension and shows them live.
      - Secrets are never logged, and it stays completely off for everyone else.

  - version: 0.1.0
    build: 23
    date: 2026-07-16
    type: build
    title: Manually Syndicate no longer fails on a transient GitHub hiccup
    notes:
      - The server now retries GitHub's identity check when GitHub rate-limits it, instead of reporting a valid session as an unverifiable token.
      - When it does fail, the message now names GitHub's real status so the cause is clear.

  - version: 0.1.0
    build: 22
    date: 2026-07-16
    type: build
    title: The shares feed shows public shares while your membership resolves
    notes:
      - The new-tab shares feed now loads the public shares immediately instead of staying blank until membership resolves, then folds in the member-only stream once you are confirmed paid.
      - This fixes a case where a slow or transient membership check left the shares screen empty even though shares existed.

  - version: 0.1.0
    build: 21
    date: 2026-07-16
    type: build
    title: Shares feed recovers after a membership hiccup
    notes:
      - The shares feed no longer stays blank if it loaded before your membership finished resolving; it retries.

  - version: 0.1.0
    build: 20
    date: 2026-07-16
    type: build
    title: Fix opening a share directly in the new tab
    notes:
      - Fixed a new-tab crash when a share was opened by a direct deep link (a helper was called before it was defined).

  - version: 0.1.0
    build: 19
    date: 2026-07-16
    type: build
    title: Reddit first comment credits the poster on shares
    notes:
      - The Reddit first-comment default now credits the member and works for shares, not just posts.

  - version: 0.1.0
    build: 18
    date: 2026-07-16
    type: build
    title: Mastodon syndication destination
    notes:
      - Finished the Mastodon destination: posts use the templates and credit the author by their Mastodon handle.
      - Mastodon is a free auto channel, enabled once the instance URL and access token are provisioned.

  - version: 0.1.0
    build: 17
    date: 2026-07-16
    type: build
    title: Bluesky hashtags are real tags
    notes:
      - Bluesky posts now render the hashtags as real, clickable, searchable tags (faceted), not plain text.

  - version: 0.1.0
    build: 16
    date: 2026-07-16
    type: build
    title: Bluesky posts mention the author
    notes:
      - A Bluesky post now tags the author by their Bluesky handle when their profile lists one, else their full name.
      - The handle is a real, clickable mention (a resolved facet), so the member is notified.

  - version: 0.1.0
    build: 15
    date: 2026-07-16
    type: build
    title: Bluesky syndication destination
    notes:
      - Finished the Bluesky destination: posts now use the templates and post a clickable link preview card.
      - Bluesky is a free auto channel, enabled once the account handle and app password are provisioned.

  - version: 0.1.0
    build: 14
    date: 2026-07-15
    type: build
    title: Social Queue popup polish
    notes:
      - Widened the Social Queue popup, added channel brand logos, compact rows, type and channel filters, and pagination.

  - version: 0.1.0
    build: 13
    date: 2026-07-15
    type: build
    title: Social Queue for manual posting
    notes:
      - Added a superadmin Social Queue in the avatar menu for channels that cost money to post to, like X.
      - The system queues the post with the text ready; a human posts it by hand through the free web composer, then marks it done.
      - X is now a manual-assist channel, so nothing auto-posts to it and there is no per-tweet API charge.

  - version: 0.1.0
    build: 12
    date: 2026-07-15
    type: build
    title: Full-screen splash hides the sidebar without an image
    notes:
      - The full-screen new-tab background now hides the sidebar even when no background image is loaded.

  - version: 0.1.0
    build: 11
    date: 2026-07-15
    type: build
    title: Syndicate popup respects a public item
    notes:
      - Fixed the manual syndicate popup treating a public item as members-only when its index row lacked a visibility flag.

  - version: 0.1.0
    build: 10
    date: 2026-07-15
    type: build
    title: Richer X posts (author handle plus hashtags)
    notes:
      - An X post now tags the author by their X handle when their profile lists one, else their full name.
      - The content tags and the category post as hashtags for discovery.

  - version: 0.1.0
    build: 9
    date: 2026-07-14
    type: build
    title: X (Twitter) syndication destination
    notes:
      - Finished the X destination: a post or a share can now syndicate to the co-op X account.
      - A members-only item posts a short stub with the link, never the gated content.

  - version: 0.1.0
    build: 8
    date: 2026-07-13
    type: build
    title: The changelog and version indicator
    notes:
      - Added this changelog and a version indicator to the new-tab hub, bottom right, that links here.
      - The page shows official releases by default, with a toggle to reveal the development build notes.

  - version: 0.1.0
    build: 7
    date: 2026-07-13
    type: release
    title: Version 0.1.0, the first public release
    notes:
      - The new-tab member hub: sign in with GitHub, then browse the co-op activity feed and the curated news.
      - Author and read your gbti.network content in place, with member-only bodies decrypted through the worker.
      - Syndicate a share or a post to Discord and to dev.to, with a hold window you can approve early.
      - Submitted to the Chrome Web Store and pending review. The direct download stays the fallback.

  - version: 0.1.0
    build: 6
    date: 2026-07-13
    type: build
    title: Chrome Web Store submission
    notes:
      - Prepared and submitted the v0.1.0 package for review, set to publish publicly once it passes.
      - Generated the store icon, screenshots, and promo tiles from the brand and stored them under the product folder.
      - Extended the privacy policy to describe the extension data handling.

  - version: 0.1.0
    build: 5
    date: 2026-07-13
    type: build
    title: The dev.to destination
    notes:
      - Crosspost a post or a share to the GBTI organization on dev.to, manually or automatically.
      - A member-only item posts a stub with its description and a link, never the gated body.
      - Added an admin-editable call-to-action footer and the short-description token.

  - version: 0.1.0
    build: 4
    date: 2026-07-12
    type: build
    title: Syndication datatable and per-channel stubs
    notes:
      - Rebuilt the syndication admin view as a filterable datatable with low padding.
      - Gave every channel its own members-stub template so each destination reads in its own voice.

  - version: 0.1.0
    build: 3
    date: 2026-07-12
    type: build
    title: Reddit posting options
    notes:
      - The manual Reddit composer now supports a link post or a text post.
      - The template drives the post body, with a separately templated first comment.

  - version: 0.1.0
    build: 2
    date: 2026-07-11
    type: build
    title: Member profile referral touches
    notes:
      - A visit to a member profile page now counts as a first-touch referral entry point, with no ref code needed.

  - version: 0.1.0
    build: 1
    date: 2026-07-11
    type: build
    title: The update banner
    notes:
      - The new tab shows a non-blocking banner when a newer extension version is available to download.
