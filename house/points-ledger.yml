# Contributor points ledger (ADMIN-owned; see CODEOWNERS, it falls under the rest of house/** = admin
# tier, so the gate rejects any non-admin PR that touches it). SOW-008. Procedures live in
# .data/ops/revenue-ops/README.md. Members never edit this file; the contribution merge automation
# writes new awards, an author raises a dispute through the client, and an admin adjudicates by editing
# the record here. Effective status precedence still applies: a banned contributor earns nothing.
#
# One record per accepted point-bearing contribution. Grammar fixes are courtesy and create NO record.
# Each award:
#   - id: award-<commit>                       # stable id (the merge commit)
#     contributor_github_id: "..."             # immutable id of the contributor
#     contributor_login: someone
#     target: { username: owner, type: post, slug: the-post }
#     commit: <sha>
#     url: https://github.com/<repo>/commit/<sha>
#     class: correction                        # grammar (never recorded) | correction | addition
#     points: 1                                # floor 1 for correction/addition; owner may award more
#     status: awarded                          # awarded | author-rejected | admin-upheld | admin-overturned
#     created_at: 2026-06-03
#     resolved_at: null
#     note: null
awards: []
