# SOW-080: the flat, git-native TOPIC VOCABULARY a member can follow (stored in prefs.categories). DECOUPLED from the
# content taxonomy (house/taxonomy.yml) so the follow-topic list grows without re-tagging any content. Read by
# src/lib/taxonomy.ts (the site build + /topics.json), validated against house/topic-map.yml, and rendered by the
# extension topic picker. Each entry is a kebab-case key -> { label, group? } (group is optional). Admin-owned
# (house/** is CODEOWNED). A topic that is ALSO a content-taxonomy primary drives the browse drill-down; a topic with a
# house/topic-map.yml entry also biases the news feed; otherwise a topic is a browse/interest follow. No em/en dashes.
topics:
  # Tech & Building
  ai: { label: AI }
  devops: { label: DevOps }
