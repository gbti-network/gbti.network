# SOW-043: news-category -> Discord channel id (admin-owned house config).
#
# When a member HEARTS a members-only news item (or a superadmin uses "Add to Discord"), the signup Worker posts
# that item to the mapped channel ONCE, deduped on the news item's guid (news-posted:<guid> in KV). A category
# with NO mapping here means the heart is still recorded, but nothing is posted to Discord (fail-closed).
#
# `category` is a news category from the news worker's classifier (gbti-news-api/config/categories.mjs).
# `channelId` is the numeric Discord channel id the bot posts into (the bot must be in that guild + have send
# permission — provisioned by the owner). Channel ids are non-secret.
#
# Empty by default until the news worker is deployed + the channels are chosen. Example:
#   channels:
#     - category: ai
#       channelId: "111111111111111111"
#     - category: devops
#       channelId: "222222222222222222"
channels: []
