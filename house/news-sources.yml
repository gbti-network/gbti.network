# SOW-056: the canonical news source pool (git-native, portable). This file IS the curation: a fork that
# clones this repo carries its sources, and points its news worker at its own published /news-sources.json.
# Admin-CODEOWNED (house/**). The Astro build emits src/pages/news-sources.json.ts from this; the gbti-news
# worker fetches that artifact each cron (NEWS_SOURCES_URL) and rotates through the enabled set via a KV cursor.
# Each entry: { id (stable, unique), name, url (RSS/Atom feed), description (shown in the reader), enabled }.
# Disable a noisy source with enabled: false (kept for history) instead of deleting it.
