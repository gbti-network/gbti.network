# SOW-058 (+ SOW-057): syndication configuration. Admin/superadmin-CODEOWNED (house/**), so a PR changing it
# without the required role is auto-rejected by the SOW-005 gate.
#
# Read by membership/syndication-config.mjs and mirrored to the KV key `synd:config` by `npm run reconcile
# --apply`, so the signup Worker drain reads the live values WITHOUT a redeploy. This file carries NO secrets;
# the per-channel API tokens live only in the Worker secret store.
#
# Fail-closed: ships disabled. Flip `enabled: true` and the per-channel switches when ready to syndicate. A
# channel switched on here still also requires its secret to be configured at drain time (otherwise it is
# recorded "skipped", never "failed").
syndication:
  enabled: true
  require_approval: false
  hold_minutes: 60
  upvote_threshold: 2
  classify: ai
  templates:
    share: Shared by {memberdiscord} {shareurl}
  news_engagement:
    enabled: true
    open_threshold: 2
    tier: paid
    comment_autopost: true
  channels:
    discord: true
    discord-category: true
    x: false
    linkedin: false
    mastodon: false
    bluesky: true
    reddit: false
    devto: false
  # SOW-121: channels the system NEVER auto-posts to (no adapter call). Instead it enqueues a superadmin
  # Social Queue task (a human posts it by hand through the free web composer). X is here because its API
  # posting costs $0.20 per link-bearing tweet after the free tier was deprecated. A channel here must be
  # OFF in `channels` above (auto-post and manual-assist are mutually exclusive).
  manual_assist_channels:
    - x
  channel_templates:
    devto:
      devto-footer: "The resource shared in this post is a new {content-type} published by GBTI Network member {fullName}. \n\n---\n\n>Are you a writer, musician, or product developer? We would love to support your work on the GBTI Network. For more information about how to join our community visit https://gbti.network\n\n>To follow {fullName}'s work more closely, consider joining our network and subscribing to them directly: {member-url}"
    # SOW-120: the X default message. {member-x-handle} resolves to the author's X @handle (from their
    # profile links.x) when present, else their full name. The URL sits before the hashtags so a 280-char
    # trim clips a trailing hashtag, never the link (X auto-cards the URL). A members-only item ignores this
    # and uses the X stub instead.
    x:
      post: 'New {content-type} by {member-x-handle}: "{title}" {url} {category-hashtag} {tags-hashtags}'
      product: 'New {content-type} by {member-x-handle}: "{title}" {url} {category-hashtag} {tags-hashtags}'
      prompt: 'New {content-type} by {member-x-handle}: "{title}" {url} {category-hashtag} {tags-hashtags}'
      share: '{member-x-handle} shared: "{title}" {url} {category-hashtag} {tags-hashtags}'
    # SOW-122: the Bluesky default message. It OMITS {url} because the adapter attaches an external embed
    # card (a clickable link preview); the AT protocol does not auto-link a bare URL in post text.
    bluesky:
      post: 'New {content-type} by {member-bluesky-handle}: "{title}" {category-hashtag} {tags-hashtags}'
      product: 'New {content-type} by {member-bluesky-handle}: "{title}" {category-hashtag} {tags-hashtags}'
      prompt: 'New {content-type} by {member-bluesky-handle}: "{title}" {category-hashtag} {tags-hashtags}'
      share: '{member-bluesky-handle} shared: "{title}" {category-hashtag} {tags-hashtags}'
