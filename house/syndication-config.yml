# SOW-058 (+ SOW-057): syndication configuration. Admin/superadmin-CODEOWNED (house/**), so a PR changing it
# without the required role is auto-rejected by the SOW-005 gate.
#
# Read by membership/syndication-config.mjs and mirrored to the KV key `synd:config` by `npm run reconcile
# --apply`, so the signup Worker drain reads the live values WITHOUT a redeploy. This file carries NO secrets;
# the per-channel API tokens live only in the Worker secret store.
#
# Fail-closed: ships disabled. Flip `enabled: true` and the per-channel switches when ready to syndicate. A
# channel switched on here still also requires its secret to be configured at drain time (otherwise it is
# recorded "skipped", never "failed").
#
# auto_matrix cell modes (per content type x channel; a missing cell = the code default, shares OFF and every
# other type ON):
#   on        = On-Automatic: the channel adapter posts after the hold window.
#   on-manual = On-Manual: delivered as a superadmin SOCIAL QUEUE task for review. The queue's Post now sends
#               it through the adapter; X and LinkedIn are posted by hand (they cannot auto-post, so this is
#               their only deliverable mode; a legacy `on` coerces here, and the settings UI never offers
#               them On-Automatic).
#   off       = never. popular = only when the engagement engine promotes the item (trigger: popular).
# `manual_assist_channels` below is DEPRECATED for routing (per-cell on-manual + the code-level channel
# capability replaced it); it stays only so an old reader parses.
#
# NOTE: an admin settings save rewrites this file and keeps ONLY this leading comment block, so durable
# documentation belongs HERE, not beside the keys below.
syndication:
  enabled: true
  require_approval: false
  hold_minutes: 60
  # SOW-125: DEPRECATED and inert. The SOW-057 upvote trigger is retired (shares enqueue at publish per SOW-087,
  # and default OFF per SOW-125). Left only so an old reader does not choke; it drives nothing. Remove when safe.
  upvote_threshold: 2
  classify: ai
  templates:
    share: Shared by {memberdiscord} {shareurl}
  news_engagement:
    enabled: true
    open_threshold: 2
    tier: paid
    comment_autopost: true
  channels:
    discord: true
    discord-category: true
    x: false
    linkedin: false
    mastodon: true
    bluesky: true
    reddit: false
    devto: false
  # DEPRECATED for routing (see the header note); kept only so an old reader parses.
  manual_assist_channels:
    - x
    - linkedin
  # The per-type-per-channel auto-share matrix; the cell-mode legend lives in the HEADER comment (the only
  # block an admin settings save preserves). Only cells differing from the code default need to appear.
  auto_matrix:
    share:
      discord: off
      discord-category: off
      reddit: off
      devto: off
      mastodon: off
      bluesky: off
      x: off
      linkedin: off
    post:
      x: on-manual
      linkedin: on-manual
    product:
      x: on-manual
      linkedin: on-manual
    prompt:
      x: on-manual
      linkedin: on-manual
  # channel_hold_minutes:      # optional per-channel delay override in minutes (0..1440); absent = hold_minutes
  #   bluesky: 120
  channel_templates:
    devto:
      devto-footer: "The resource shared in this post is a new {content-type} published by GBTI Network member {fullName}. \n\n---\n\n>Are you a writer, musician, or product developer? We would love to support your work on the GBTI Network. For more information about how to join our community visit https://gbti.network\n\n>To follow {fullName}'s work more closely, consider joining our network and subscribing to them directly: {member-url}"
    # SOW-120: the X default message. {member-x-handle} resolves to the author's X @handle (from their
    # profile links.x) when present, else their full name. The URL sits before the hashtags so a 280-char
    # trim clips a trailing hashtag, never the link (X auto-cards the URL). A members-only item ignores this
    # and uses the X stub instead.
    x:
      post: 'New {content-type} by {member-x-handle}: "{title}" {url} {category-hashtag} {tags-hashtags}'
      product: 'New {content-type} by {member-x-handle}: "{title}" {url} {category-hashtag} {tags-hashtags}'
      prompt: 'New {content-type} by {member-x-handle}: "{title}" {url} {category-hashtag} {tags-hashtags}'
      share: '{member-x-handle} shared: "{title}" {url} {category-hashtag} {tags-hashtags}'
    # SOW-122: the Bluesky default message. It OMITS {url} because the adapter attaches an external embed
    # card (a clickable link preview); the AT protocol does not auto-link a bare URL in post text.
    bluesky:
      post: 'New {content-type} by {member-bluesky-handle}: "{title}" {category-hashtag} {tags-hashtags}'
      product: 'New {content-type} by {member-bluesky-handle}: "{title}" {category-hashtag} {tags-hashtags}'
      prompt: 'New {content-type} by {member-bluesky-handle}: "{title}" {category-hashtag} {tags-hashtags}'
      share: '{member-bluesky-handle} shared: "{title}" {category-hashtag} {tags-hashtags}'
    # SOW-123: the Mastodon default message. Mastodon auto-links the {url}, auto-tags the #hashtags, and
    # resolves the @user@instance mention natively, so they all ride in the text (no facets).
    mastodon:
      post: 'New {content-type} by {member-mastodon-handle}: "{title}" {url} {category-hashtag} {tags-hashtags}'
      product: 'New {content-type} by {member-mastodon-handle}: "{title}" {url} {category-hashtag} {tags-hashtags}'
      prompt: 'New {content-type} by {member-mastodon-handle}: "{title}" {url} {category-hashtag} {tags-hashtags}'
      share: '{member-mastodon-handle} shared: "{title}" {url} {category-hashtag} {tags-hashtags}'
    # SOW-127: the LinkedIn message. LinkedIn is long-form (3000 chars) and plain-text @-mentions are not
    # clickable, so it credits the author by {fullName} and carries the link + hashtags. A superadmin posts it
    # by hand from the Social Queue (Assist opens the LinkedIn composer; Copy pastes the text).
    linkedin:
      post: 'New {content-type} by {fullName}: "{title}"\n\n{short-description}\n\n{url} {category-hashtag} {tags-hashtags}'
      product: 'New {content-type} by {fullName}: "{title}"\n\n{short-description}\n\n{url} {category-hashtag} {tags-hashtags}'
      prompt: 'New {content-type} by {fullName}: "{title}"\n\n{short-description}\n\n{url} {category-hashtag} {tags-hashtags}'
      share: '{fullName} shared: "{title}"\n\n{short-description}\n\n{url} {category-hashtag} {tags-hashtags}'
