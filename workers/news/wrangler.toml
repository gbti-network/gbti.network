# Cloudflare Worker config for the GBTI news feed API.
#
# One Worker, two entry points (src/index.mjs):
#   - scheduled()  fires hourly (the cron trigger below): fetch the configured RSS/Atom sources ->
#                  parse -> dedupe against the stored collection -> classify NEW items with Workers AI
#                  into the file-defined categories -> write the collection to KV -> prune old items.
#   - fetch()      serves the bearer-authenticated JSON REST API (/feed, /categories, /sources, /refresh).
#
# Sources, source descriptions, and categories are managed as FILES in config/ (no database). The
# polled item collection is stored in KV ("for now"; src/store.mjs isolates this so R2/another backend
# is a one-file swap later).
#
# Deploy:  npx wrangler deploy            (default/sandbox worker `gbti-news`)
#          npx wrangler deploy --env production
# Local:   npx wrangler dev --remote      (--remote is REQUIRED so Workers AI runs against the real
#                                           model; there is no local AI). Reads .dev.vars.
#
# Secrets (NEWS_API_KEY) are NEVER committed. Set with `npx wrangler secret put NEWS_API_KEY`
# for production and via .dev.vars for local dev. The [vars] block holds only non-secret config.

name = "gbti-news"
main = "src/index.mjs"
compatibility_date = "2026-06-16"
compatibility_flags = ["nodejs_compat"]

# Same Cloudflare account as the sibling gbti.network worker. Pinned so a deploy can never land in
# the wrong account when multiple are authenticated.
account_id = "d42b12e969229c5187ad0f7289536487"

# SOW-043: hourly ingestion ENABLED (the host app absorbs the news worker + wants the automated workflow). This
# schedule registers on the next `wrangler deploy` of this worker. Stays within the Cloudflare free-tier budget
# (SOURCE_CHUNK + MAX_CLASSIFY + ~9 KV ops < 50 subrequests/run). Set back to [] to pause ingestion.
# Two schedules, each with its OWN free-tier budget (50 subrequests + 10 ms CPU per invocation): ingest at :00
# (collection + AI) and the SOW-050 image backfill at :30 (offset so they never overlap on KV). 2 of the Free
# limit of 5 cron triggers per account. The :30 run is matched by IMAGE_BACKFILL_CRON in [vars].
[triggers]
crons = ["0 * * * *", "30 * * * *"]

# Workers AI binding (classification). Free tier: 10,000 Neurons/day.
[ai]
binding = "AI"

# KV namespace holding the polled news collection. Create it with:
#   npx wrangler kv namespace create NEWS_KV
#   npx wrangler kv namespace create NEWS_KV --preview
# then paste the printed ids below.
[[kv_namespaces]]
binding = "NEWS_KV"
id = "64b09b4d03764c979447cc008ffe528c"
preview_id = "9abe9b8204b14c04b0a8f69f48a8545c"

[observability]
enabled = true
head_sampling_rate = 1

[vars]
# Marks which environment we're in. Production blocks the /__scheduled test route.
ENVIRONMENT = "sandbox"
# Keep this many days of content (day-shards older than this are pruned each run).
RETENTION_DAYS = "30"
# Max sources to fetch per hourly run (round-robin across runs) to stay under the free 50-subrequest
# limit. With ~80 sources, 20/run => the full catalog is refreshed over ~4 hourly runs.
# 0 = no limit (fetch all every run).
SOURCE_CHUNK = "20"
# Max AI classifications per run (fetches + AI + KV ops must stay < 50 subrequests on the free plan).
# Overflow items get a keyword/default label now and are reclassified on later runs.
MAX_CLASSIFY = "16"
# Workers AI model id used for classification.
AI_MODEL = "@cf/meta/llama-3.2-3b-instruct"
# SOW-050 Tier 1: article fetches per image-backfill run (its own 50-subrequest budget on the :30 cron). The backlog
# drains at this rate per hour (a per-item `imgTried` flag makes it converge + never refetch an image-less article).
MAX_IMAGE_BACKFILL = "12"
# The cron expression (must match one entry in [triggers].crons) that runs the image backfill instead of ingest.
IMAGE_BACKFILL_CRON = "30 * * * *"

# ===========================================================================
# PRODUCTION ENVIRONMENT  (deploy: `npx wrangler deploy --env production`)
# Wrangler does NOT inherit top-level [vars]/[ai]/[[kv_namespaces]] into a named env, so the full set
# is redefined here. Set the production secret separately: `npx wrangler secret put NEWS_API_KEY --env production`.
# SOW-043: deployed as the canonical `gbti-news` worker (production env).
# ===========================================================================
[env.production]
name = "gbti-news"

[env.production.vars]
ENVIRONMENT = "production"
RETENTION_DAYS = "30"
SOURCE_CHUNK = "20"
MAX_CLASSIFY = "16"
AI_MODEL = "@cf/meta/llama-3.2-3b-instruct"
MAX_IMAGE_BACKFILL = "12"
IMAGE_BACKFILL_CRON = "30 * * * *"

# Named envs do not inherit top-level [triggers], so the production deploy path (`--env production`) needs both
# schedules redefined here (ingest at :00 + the SOW-050 image backfill at :30).
[env.production.triggers]
crons = ["0 * * * *", "30 * * * *"]

[env.production.ai]
binding = "AI"

[[env.production.kv_namespaces]]
binding = "NEWS_KV"
id = "64b09b4d03764c979447cc008ffe528c"

[env.production.observability]
enabled = true
head_sampling_rate = 1
