<!doctype html>
<!-- SOW-018 + SOW-036: the GBTI extension's Shares page (extension-only; Shares have no public website surface),
     inside the shared member-hub shell (top bar + left rail injected by shell.mjs). Mounts <gbti-shares> (the
     composer over the co-op reading feed) behind the membership lock gate. The token stays in the worker. -->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shares · GBTI Network</title>
  <!-- No-flash theme: external (not inline) because MV3 extension_pages CSP forbids inline scripts. -->
  <script src="dist/theme-init.js"></script>
  <link rel="stylesheet" href="shell.css" />
  <style>
    .hub-h { font-family: var(--f-display); font-weight: 800; font-size: 26px; letter-spacing: -.02em; margin: 0 0 4px; }
    .hub-sub { color: var(--fg-mute); font-size: 14px; margin: 0 0 18px; }
  </style>
</head>
<body>
  <div class="nt" data-shell data-active="shares">
    <main class="nt-main">
      <h1 class="hub-h">Shares</h1>
      <p class="hub-sub">The co-op stream.</p>
      <gbti-lock-gate>
        <gbti-shares></gbti-shares>
      </gbti-lock-gate>
    </main>
  </div>
  <script src="dist/shares.js"></script>
</body>
</html>
