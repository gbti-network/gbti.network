<!doctype html>
<!-- SOW-129: the GBTI extension's Profile page, inside the shared member-hub shell (top bar + left rail injected by
     shell.mjs). Mounts <gbti-profile-editor> (identity, bio, presence, skills, specialties, and the branded social
     links repeater). The member's profile.md publishes through the fork PR path, so this drives the public profile.
     The token stays in the background worker; the element talks only to the injected client. -->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Profile · GBTI Network</title>
  <!-- No-flash theme: external (not inline) because MV3 extension_pages CSP forbids inline scripts. -->
  <script src="dist/theme-init.js"></script>
  <link rel="stylesheet" href="shell.css" />
  <style>
    .hub-h { font-family: var(--f-display); font-weight: 800; font-size: 24px; letter-spacing: -.02em; margin: 0; }
    .hub-sub { color: var(--fg-mute); font-size: 14px; margin: 4px 0 0; }
    gbti-profile-editor { display: block; max-width: 720px; margin: 0 auto; }
    /* The welcome-flow landing banner (?welcome=1, mounted by profile.mjs). */
    .welcome-banner { display: flex; align-items: flex-start; gap: 14px; max-width: 720px; margin: 0 auto 18px;
      padding: 14px 16px; border: 1.5px solid rgba(31, 158, 95, .45); border-radius: 12px;
      background: rgba(31, 158, 95, .08); color: var(--fg); font-size: 14px; line-height: 1.55; }
    .welcome-banner b { color: var(--brand, #1f9e5f); }
    .welcome-banner button { flex: none; margin-left: auto; font: inherit; font-size: 18px; line-height: 1;
      color: var(--fg-mute); background: transparent; border: 0; cursor: pointer; padding: 0 2px; }
    .welcome-banner button:hover { color: var(--fg); }
  </style>
</head>
<body>
  <div class="nt" data-shell data-active="profile">
    <main class="nt-main">
      <div class="nt-top" data-topbar>
        <div><h1 class="hub-h">Profile</h1><p class="hub-sub">Your public profile, social links, and specialties.</p></div>
      </div>
      <gbti-profile-editor></gbti-profile-editor>
    </main>
  </div>
  <script src="dist/profile.js"></script>
</body>
</html>
