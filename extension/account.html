<!doctype html>
<!-- SOW-040: the GBTI extension's Account / Settings page, inside the shared member-hub shell (top bar + left rail
     injected by shell.mjs). Mounts <gbti-account> (membership, billing, referrals, danger zone). NOT behind the
     membership lock gate: a lapsed member must reach this page to renew, cancel, or delete. The token stays in the
     background worker; the element talks only to the injected client. -->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Account · GBTI Network</title>
  <!-- No-flash theme: external (not inline) because MV3 extension_pages CSP forbids inline scripts. -->
  <script src="dist/theme-init.js"></script>
  <link rel="stylesheet" href="shell.css" />
  <style>
    .hub-h { font-family: var(--f-display); font-weight: 800; font-size: 24px; letter-spacing: -.02em; margin: 0; }
    .hub-sub { color: var(--fg-mute); font-size: 14px; margin: 4px 0 0; }
    gbti-account { display: block; max-width: 720px; }
  </style>
</head>
<body>
  <div class="nt" data-shell data-active="settings">
    <main class="nt-main">
      <div class="nt-top" data-topbar>
        <div><h1 class="hub-h">Settings</h1><p class="hub-sub">Membership, billing, referrals, and account controls.</p></div>
      </div>
      <gbti-account></gbti-account>
      <!-- SOW-054 Phase 5: manage followed topics later (the same picker as the onboarding Topics step). -->
      <section style="max-width:720px;margin:30px auto 0">
        <h2 class="hub-h" style="font-size:18px">Followed topics</h2>
        <p class="hub-sub" style="margin:4px 0 14px">Pick the topics you care about. Your activity feed and news default to them. Leave it empty to see everything.</p>
        <gbti-topic-picker></gbti-topic-picker>
      </section>
    </main>
  </div>
  <script src="dist/account.js"></script>
</body>
</html>
