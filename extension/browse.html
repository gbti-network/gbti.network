<!doctype html>
<!-- SOW-031 + SOW-036: the GBTI extension's in-extension content Browser, inside the shared member-hub shell
     (top bar + left rail injected by shell.mjs). Browse Articles / Products / Prompts / Shares and open any item
     in the in-extension reader (no navigating to gbti.network). The token stays in the background worker. -->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Browse · GBTI Network</title>
  <!-- No-flash theme: external (not inline) because MV3 extension_pages CSP forbids inline scripts. -->
  <script src="dist/theme-init.js"></script>
  <link rel="stylesheet" href="shell.css" />
  <style>
    .hub-h { font-family: var(--f-display); font-weight: 800; font-size: 26px; letter-spacing: -.02em; margin: 0 0 18px; }
  </style>
</head>
<body>
  <div class="nt" data-shell>
    <main class="nt-main">
      <h1 class="hub-h">Browse the co-op</h1>
      <gbti-lock-gate>
        <gbti-browse></gbti-browse>
      </gbti-lock-gate>
    </main>
  </div>
  <script src="dist/browse.js"></script>
</body>
</html>
