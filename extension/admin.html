<!doctype html>
<!-- SOW-036/038: the GBTI extension's Admin page, inside the shared member-hub shell (top bar + left rail injected
     by shell.mjs). Mounts <gbti-admin> (role-gated moderation/admin tools, SOW-006 AD1). <gbti-admin> self-gates on
     the signed-in role and the SOW-005 gate + CODEOWNERS are the real boundary, so opening it is harmless for a
     plain member. Reached from the avatar menu's "Admin tools" entry (shown only for moderator+). -->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin · GBTI Network</title>
  <!-- No-flash theme: external (not inline) because MV3 extension_pages CSP forbids inline scripts. -->
  <script src="dist/theme-init.js"></script>
  <link rel="stylesheet" href="shell.css" />
  <style>
    .hub-h { font-family: var(--f-display); font-weight: 800; font-size: 26px; letter-spacing: -.02em; margin: 0 0 4px; }
    .hub-sub { color: var(--fg-mute); font-size: 14px; margin: 0 0 18px; }
    .hub-h2 { font-family: var(--f-display); font-weight: 700; font-size: 17px; letter-spacing: -.01em; margin: 28px 0 12px; }
  </style>
</head>
<body>
  <div class="nt" data-shell>
    <main class="nt-main">
      <h1 class="hub-h">Admin tools</h1>
      <p class="hub-sub">Governance and moderation.</p>
      <h2 class="hub-h2">Member roster</h2>
      <gbti-superadmin-dashboard></gbti-superadmin-dashboard>
      <h2 class="hub-h2">Actions</h2>
      <gbti-admin></gbti-admin>
    </main>
  </div>
  <script src="dist/admin.js"></script>
</body>
</html>
