<!doctype html>
<!-- SOW-033 + SOW-036: the GBTI extension's member Workspace, inside the shared member-hub shell (top bar + left
     rail injected by shell.mjs). Mounts <gbti-workspace> (my articles/prompts/products + my pull requests, items
     opening in place) behind the membership lock gate. The token stays in the background worker. -->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My workspace · GBTI Network</title>
  <!-- No-flash theme: external (not inline) because MV3 extension_pages CSP forbids inline scripts. -->
  <script src="dist/theme-init.js"></script>
  <link rel="stylesheet" href="shell.css" />
  <style>
    .hub-h { font-family: var(--f-display); font-weight: 800; font-size: 24px; letter-spacing: -.02em; margin: 0; }
  </style>
</head>
<body>
  <div class="nt" data-shell data-active="overview">
    <main class="nt-main">
      <div class="nt-top" data-topbar><h1 class="hub-h">My WorkBench</h1></div>
      <gbti-lock-gate>
        <gbti-workspace></gbti-workspace>
      </gbti-lock-gate>
    </main>
  </div>
  <script src="dist/workspace.js"></script>
</body>
</html>
