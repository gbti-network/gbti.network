name: Award contribution

# SOW-008. When a contribution PR merges (the folder owner accepted it), credit the contributor:
# add them to the target content file's `contributors` frontmatter and, for a point-bearing class,
# record an award in house/points-ledger.yml. The pure logic lives in scripts/derive-award-payload.mjs
# (deriving the payload from the merged PR metadata) + scripts/award-contribution.mjs + membership/points.mjs
# (all unit-tested). This job is metadata-only: it NEVER checks out or runs PR-head code.
#
# The award is applied through a PR, not a direct push: it writes house/points-ledger.yml, which is
# admin-CODEOWNED with no-bypass, so an admin reviews the points write before it merges (anti-gaming;
# this is also where the owner's "reject the award" dispute is exercised). The contributor credit in the
# content file rides along in the same PR.
#
# HUMAN-TODO before enabling (see .data/sow/human-todo.md): provide GITHUB_BOT_TOKEN (a gbtilabs PAT with
# repo + pull-requests write, so the opened PR triggers the gate and the gate exempts the bot) and
# GITHUB_CONTENT_REPO (owner/name). Populate house/members-index.yml so the owner github_id resolves.
# The contribution class is read from a `contribution:<grammar|correction|addition>` label (the client
# sets it); absent a class label, an accepted contribution defaults to `correction` (the owner can dispute).

on:
  pull_request_target:
    types: [closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  award:
    # Only on a merged PR the gate accepted as a contribution.
    if: >
      github.event.pull_request.merged == true &&
      contains(join(github.event.pull_request.labels.*.name, ','), 'contribution-accepted')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # BASE branch (no PR-head checkout)
        with:
          token: ${{ secrets.GH_BOT_TOKEN }} # push + open the award PR as the bot
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci --ignore-scripts --omit=optional

      # Derive payload.json from the merged PR's metadata (changed paths via the API, not a checkout).
      - name: Derive award payload (metadata-only)
        id: derive
        run: node scripts/derive-award-payload.mjs
        env:
          GITHUB_BOT_TOKEN: ${{ secrets.GH_BOT_TOKEN }}
          GITHUB_CONTENT_REPO: gbti-network/gbti.network

      # Write the contributor credit + the points award into the working tree (idempotent).
      - name: Apply the award
        if: steps.derive.outputs.ready == 'true'
        run: node scripts/award-contribution.mjs --payload payload.json

      # Open the award PR (an admin reviews the house/ ledger write before it merges).
      - name: Open the award PR
        if: steps.derive.outputs.ready == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_BOT_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_ID: ${{ github.run_id }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          rm -f payload.json # never commit the transient payload
          if [ -z "$(git status --porcelain)" ]; then
            echo "award: no changes (already credited); nothing to open."
            exit 0
          fi
          git config user.name "gbtilabs"
          git config user.email "gbtilabs@users.noreply.github.com"
          BRANCH="award/pr-${PR_NUMBER}-${RUN_ID}"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "Award: credit contribution from #${PR_NUMBER}"
          git push origin "$BRANCH"
          gh pr create \
            --base "$DEFAULT_BRANCH" \
            --head "$BRANCH" \
            --title "Award: credit contribution from #${PR_NUMBER}" \
            --body "Automated SOW-008 award for the merged contribution in #${PR_NUMBER}. Credits the contributor in the target content file and records the points award in house/points-ledger.yml. An admin reviews the house/ write before this merges."
