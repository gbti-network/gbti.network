name: Enqueue content for syndication

# SOW-034 + SOW-058. When a member's post/product/prompt merges to main, ENQUEUE it into the syndication queue
# (Cloudflare KV) instead of posting immediately. Each item is `pending` and waits for a superadmin to APPROVE it in
# the tracker; the signup Worker's cron drain then posts the approved item to every enabled channel (Discord + the
# social adapters). Driven off the MERGE DIFF (files ADDED in the push) + idempotent on the queue dedupeKey, so the
# backlog is never re-enqueued. Metadata only (url + title + blurb + image); a members-only / Mode A body is never
# read. Shares are NOT enqueued here (they enqueue via the SOW-057 upvote threshold). Re-run via workflow_dispatch.

on:
  push:
    branches: [main]
    paths:
      - 'members/**'
      - 'house/**'
  workflow_dispatch:
    inputs:
      added:
        description: 'Space-separated content paths to (re)announce (e.g. members/alice/posts/x/index.md)'
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: syndicate-content
  cancel-in-progress: false

jobs:
  syndicate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need the previous main HEAD to diff the merge
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci --ignore-scripts --omit=optional

      # The files ADDED in this push that are publishable content (posts/products/prompts index.md + shares).
      # A reconcile draft<->published flip or an edit is a MODIFY, not an ADD, so it never re-announces.
      - name: Compute added content paths
        id: diff
        # All event-controlled values flow through env (never interpolated into the script) so neither the
        # dispatch input nor the commit refs can be a shell-injection sink.
        env:
          DISPATCH_ADDED: ${{ github.event.inputs.added }}
          EVENT_BEFORE: ${{ github.event.before }}
          EVENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ -n "$DISPATCH_ADDED" ]; then
            ADDED="$DISPATCH_ADDED"
          else
            BEFORE="$EVENT_BEFORE"
            AFTER="$EVENT_SHA"
            if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              FILES=$(git show --diff-filter=A --name-only --format= "$AFTER")
            else
              FILES=$(git diff --diff-filter=A --name-only "$BEFORE" "$AFTER")
            fi
            # Strict charset (lowercase kebab owner/slug, no metacharacters) so a path can never carry a shell
            # injection even though it is passed via an env var below.
            ADDED=$(printf '%s\n' "$FILES" | grep -E '^(members/[a-z0-9][a-z0-9-]*|house)/(posts|products|prompts)/[a-z0-9][a-z0-9-]*/index\.md$|^members/[a-z0-9][a-z0-9-]*/shares/[a-z0-9][a-z0-9._-]*\.(md|mdx)$' | tr '\n' ' ' || true)
          fi
          echo "added=$ADDED" >> "$GITHUB_OUTPUT"
          echo "Added content paths: ${ADDED:-<none>}"

      - name: Enqueue for approval (apply)
        if: steps.diff.outputs.added != ''
        # SOW-058: ENQUEUE each published post/product/prompt into the syndication queue (KV) instead of posting to
        # Discord directly. Each item is `pending` and waits for a superadmin to APPROVE it in the tracker; the Worker
        # cron drain then posts it to every enabled channel. Shares are NOT enqueued here (they enqueue via the
        # SOW-057 upvote threshold). Paths flow through SYNDICATE_ADDED (env), never interpolated -> no injection.
        run: node scripts/enqueue-syndication.mjs --apply
        env:
          SYNDICATE_ADDED: ${{ steps.diff.outputs.added }}
          # The KV REST creds let Actions write the same SIGNUP_KV namespace the Worker drains. The drain (in the
          # Worker) holds the Discord/social tokens now, so this job no longer needs DISCORD_BOT_TOKEN or channel ids.
          # CF_ACCOUNT_ID + CF_KV_NAMESPACE_ID are non-secret identifiers, inlined exactly like reconcile.yml /
          # sync-overrides-mirror.yml; only CF_API_TOKEN (Workers KV Storage Edit on this namespace) is a real secret
          # (already set for reconcile). CF_KV_NAMESPACE_ID MUST equal the production Worker's SIGNUP_KV id.
          CF_ACCOUNT_ID: "d42b12e969229c5187ad0f7289536487"
          CF_KV_NAMESPACE_ID: "49432379e11844ac81b6fdaf22d3937a"
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          # Enables real @mentions: resolve author -> github_id (members-index) -> Stripe customer.discord_user_id,
          # stamped on the queue item at enqueue so the drain stays network-free for identity.
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          SITE_ORIGIN: "https://gbti.network"
          # Optional JSON { "github_login": "discord_user_id" } for staff/grandfathered members not in Stripe.
          DISCORD_MENTION_OVERRIDES: ${{ secrets.DISCORD_MENTION_OVERRIDES }}
