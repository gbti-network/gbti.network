name: Credential health

# Weekly (and on-demand) probe of the live credentials. Emails the owner via Resend when a credential is failing
# or near expiry, so a lapsed token never breaks the system silently. The job also fails (red) on any problem, as
# a backup signal if email is unconfigured. See .data/ops/secrets-ops/README.md.

on:
  schedule:
    - cron: '23 13 * * 1'   # Mondays 13:23 UTC (off the hour)
  workflow_dispatch:
    inputs:
      warn_days:
        description: 'Expiry-warning window in days. Use a very large value (e.g. 99999) to force a test alert email.'
        required: false
        default: '30'

permissions:
  contents: read

concurrency:
  group: credential-health
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      # No deps needed: the script uses node fetch + the local Resend client.
      - name: Probe credentials and alert
        run: node scripts/check-credentials.mjs
        env:
          GITHUB_BOT_TOKEN: ${{ secrets.GH_BOT_TOKEN }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ vars.RESEND_FROM }}
          ALERT_EMAIL: ${{ vars.ALERT_EMAIL }}
          GITHUB_CONTENT_REPO: gbti-network/gbti.network
          CRED_WARN_DAYS: ${{ github.event.inputs.warn_days || '30' }}
