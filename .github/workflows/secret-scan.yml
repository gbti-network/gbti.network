name: Secret scan

# Defense in depth: fails the build if any credential pattern (Stripe, GitHub, Discord, Resend, private
# keys) appears in a committable file. Real secrets live only in gitignored .env / .dev.vars and the
# platform secret stores. See scripts/check-no-secrets.mjs. Node builtins only, so no install is needed.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: node scripts/check-no-secrets.mjs
