name: E2E smoke (live)

# SOW-035 Phase 1: a manual, self-cleaning end-to-end smoke against the LIVE site + Worker, run with the real
# gbtilabs token (GH_BOT_TOKEN) so the authenticated create -> confirm -> scrub activity cycle actually runs.
# Manual dispatch only: it briefly writes (and then removes) one favorite in the live KV activity store; it is
# not safe to gate every PR on, and it needs the real token + production endpoints.

on:
  # SOW-035 Phase 5: nightly scheduled run (in addition to manual + the dashboard trigger). The suite is
  # self-cleaning and safe-by-default (it opens + auto-closes draft PRs and toggles one KV favorite/follow), so a
  # nightly run leaves no residue. Dial to weekly (e.g. '41 6 * * 1') if the draft-PR churn is undesired.
  schedule:
    - cron: '41 6 * * *'   # nightly at 06:41 UTC (off the hour)
  workflow_dispatch: {}
  # SOW-038 P3: the superadmin dashboard "Run E2E smoke" button fires repository_dispatch type 'admin-e2e'
  # (via the signup Worker's allow-listed /membership/admin/ops). Same job; the trigger is the only addition.
  repository_dispatch:
    types: [admin-e2e]

permissions:
  contents: read

concurrency:
  group: e2e-smoke
  cancel-in-progress: false

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      # SOW-035 P4: the admin-cycle imports membership modules (overrides/superadmin) that need js-yaml, so deps
      # must be installed. The api-smoke + content-cycle steps are fetch-only, but admin-cycle is not.
      # --ignore-scripts: the API harness needs no build, just node_modules.
      - run: npm ci --ignore-scripts
      - name: Run the live api-smoke (authenticated as gbtilabs)
        run: node tests/e2e/api-smoke.mjs
        env:
          E2E_TOKEN: ${{ secrets.GH_BOT_TOKEN }}
          E2E_SITE: https://gbti.network
          E2E_WORKER: https://signup.gbti.network
      - name: Run the live content-cycle (decrypt + follows + draft-PR authoring, self-cleaning)
        if: always()
        run: node tests/e2e/content-cycle.mjs
        env:
          E2E_TOKEN: ${{ secrets.GH_BOT_TOKEN }}
          E2E_SITE: https://gbti.network
          E2E_WORKER: https://signup.gbti.network
          GITHUB_CONTENT_REPO: gbti-network/gbti.network
      # SOW-035 Phase 4: admin gates + override precedence + a governance draft-PR + reconcile dry-run.
      # All safe-by-default: read-only checks or a never-merged DRAFT PR that auto-scrubs. The reconcile dry-run
      # only runs when STRIPE_SECRET_KEY (a read-only test key) is set; otherwise it skips, keeping the run green.
      - name: Run the live admin-cycle (admin gates + override precedence + governance draft-PR + reconcile dry-run)
        if: always()
        run: node tests/e2e/admin-cycle.mjs
        env:
          E2E_TOKEN: ${{ secrets.GH_BOT_TOKEN }}
          E2E_SITE: https://gbti.network
          E2E_WORKER: https://signup.gbti.network
          GITHUB_CONTENT_REPO: gbti-network/gbti.network
          # reconcile.mjs reads the GitHub token from GITHUB_BOT_TOKEN (its client), so the dry-run's repo reads
          # need it under that name (E2E_TOKEN alone is not enough). Dry-run only reads + logs; it never writes.
          GITHUB_BOT_TOKEN: ${{ secrets.GH_BOT_TOKEN }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}

  # Phase 3: the Playwright extension-UI smoke. Loads the MV3 extension headed (xvfb), seeds a signed-in state,
  # and drives the new tab + the gbti.network content-script bridge. Separate job (it needs deps + a browser).
  ext-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci --ignore-scripts
      - run: npm run build:extension
      - run: npx playwright install --with-deps chromium
      - name: Run the live extension-UI smoke (headed under xvfb, authenticated)
        run: xvfb-run -a node tests/e2e/ext-ui.mjs
        env:
          E2E_TOKEN: ${{ secrets.GH_BOT_TOKEN }}
          E2E_SITE: https://gbti.network
