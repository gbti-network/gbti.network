name: Unit tests

# Secret-free unit suite for the membership trust core, the REST clients, the PR-gate, the reconcile
# planner, and the signup Worker logic. Runs on pull_request (safe on fork code: no secrets) and on
# push to main. This is part of the trigger split (review hardening #4): only the metadata gate runs
# on pull_request_target with secrets; everything testable runs here without them.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci --ignore-scripts --omit=optional
      - run: npm test
